<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="簡潔的 Todo List 待辦事項應用程式">
    <title>Todo List</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- 固定區域：標題和輸入框 -->
        <header class="header">
            <div class="title-row">
                <h1 class="title">~待辦清單~</h1>
                <button id="settingsBtn" class="settings-btn" title="設定">⚙️</button>
            </div>

            <!-- 設定面板 -->
            <div id="settingsPanel" class="settings-panel" style="display: none;">
                <div class="settings-content">
                    <label for="scriptUrlInput" class="settings-label">Google Apps Script URL：</label>
                    <input type="text" id="scriptUrlInput" class="settings-input"
                        placeholder="https://script.google.com/macros/s/.../exec">
                    <div class="settings-actions">
                        <button id="saveSettingsBtn" class="save-settings-btn">儲存</button>
                        <button id="cancelSettingsBtn" class="cancel-settings-btn">取消</button>
                    </div>
                </div>
            </div>

            <div id="composerBackdrop" data-open="false"></div>
            <section id="composerShell" data-open="false" aria-hidden="true">
                <button id="closeComposerBtn" type="button" aria-label="關閉新增待辦">關閉</button>
                <div class="input-section">
                    <input type="text" id="todoInput" class="todo-input" placeholder="new todo" tabindex="1" aria-label="待辦事項">

                    <div class="description-wrapper">
                        <textarea id="descriptionInput" class="description-input" placeholder="description" rows="3"
                            tabindex="2" aria-label="描述"></textarea>
                        <span class="shortcut-hint">Ctrl+Enter 送出</span>
                    </div>

                    <select id="priorityInput" class="priority-select" title="優先權" tabindex="3" aria-label="優先權">
                        <option value="">優先權</option>
                        <option value="高">🔴 高</option>
                        <option value="中">🟠 中</option>
                        <option value="低">🟢 低</option>
                    </select>

                    <button id="addBtn" class="add-btn" tabindex="4">新增</button>
                </div>
            </section>
        </header>

        <!-- 可捲動區域：Todo 列表 -->
        <main class="todo-list-container">
            <ul id="todoList" class="todo-list">
                <!-- Todo items 會動態插入這裡 -->
            </ul>
        </main>

        <button id="mobileComposerBtn" type="button" aria-controls="composerShell" aria-expanded="false">新增待辦</button>
    </div>

    <!-- 自訂確認對話框 -->
    <div id="confirmModal" class="confirm-modal" style="display: none;">
        <div class="confirm-modal-backdrop"></div>
        <div class="confirm-modal-content">
            <p id="confirmMessage" class="confirm-message"></p>
            <div class="confirm-actions">
                <button id="confirmYesBtn" class="confirm-yes-btn">確定</button>
                <button id="confirmNoBtn" class="confirm-no-btn">取消</button>
            </div>
        </div>
    </div>

    <div id="statusMessageBar" class="status-message-bar" aria-live="polite"></div>

    <script src="app.js"></script>
</body>

</html>
