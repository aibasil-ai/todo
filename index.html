<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="簡潔的 Todo List 待辦事項應用程式">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- 固定區域：標題和輸入框 -->
        <header class="header">
            <div class="title-row">
                <h1 class="title">~待辦清單~</h1>
                <button id="settingsBtn" class="settings-btn" title="設定">⚙️</button>
            </div>

            <!-- 設定面板 -->
            <div id="settingsPanel" class="settings-panel" style="display: none;">
                <div class="settings-content">
                    <label for="scriptUrlInput" class="settings-label">Google Apps Script URL：</label>
                    <input type="text" id="scriptUrlInput" class="settings-input"
                        placeholder="https://script.google.com/macros/s/.../exec">
                    <div class="settings-actions">
                        <button id="saveSettingsBtn" class="save-settings-btn">儲存</button>
                        <button id="cancelSettingsBtn" class="cancel-settings-btn">取消</button>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="new-todo-row">
                    <input type="text" id="todoInput" class="todo-input" placeholder="new todo">
                    <select id="priorityInput" class="priority-select" title="優先權">
                        <option value="">優先權</option>
                        <option value="高">🔴 高</option>
                        <option value="中">🟠 中</option>
                        <option value="低">🟢 低</option>
                    </select>
                    <button id="addBtn" class="add-btn">新增</button>
                </div>

                <div class="description-wrapper">
                    <textarea id="descriptionInput" class="description-input" placeholder="description"
                        rows="3"></textarea>
                    <span class="shortcut-hint">Ctrl+Enter 送出</span>
                </div>
            </div>
        </header>

        <!-- 可捲動區域：Todo 列表 -->
        <main class="todo-list-container">
            <ul id="todoList" class="todo-list">
                <!-- Todo items 會動態插入這裡 -->
            </ul>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
